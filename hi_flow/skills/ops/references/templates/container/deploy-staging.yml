# Container form — deploy-staging.yml
# Source of truth: .github/workflows/deploy-staging.yml (Hedgeinform/zhenka),
# parameterized. Backbone: test (reuses ci.yml) → build-push (buildx → GHCR,
# gha cache) → deploy (ssh: compose pull + up + ps).
#
# Render tokens:
#   <PROJECT>      project slug — build context dir + image name + service name
#   <GHCR_OWNER>   registry owner; derived at runtime from the repo owner
#                  (lowercased) into env.OWNER — never hardcoded here
#   <SERVER_DIR>   server project directory, e.g. /srv/<PROJECT>
#
# ci.yml is NOT emitted by ops — it is a bootstrap artifact this workflow only
# REUSES via `uses:`. Do not create ci.yml from this template.
#
# staging vs prod differ ONLY in: environment (staging → no gate), image tag
# (:staging), and target service (<PROJECT>-staging on <PORT_STAGING>).
# Everything else is identical to deploy-prod.yml.

name: Deploy Staging

on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v5
        with:
          context: <PROJECT>
          push: true
          tags: ghcr.io/${{ env.OWNER }}/<PROJECT>:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd <SERVER_DIR>
            docker compose pull <PROJECT>-staging
            docker compose up -d <PROJECT>-staging
            sleep 5
            docker compose ps <PROJECT>-staging
