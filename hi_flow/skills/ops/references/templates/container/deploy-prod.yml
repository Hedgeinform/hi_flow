# Container form — deploy-prod.yml
# Source of truth: .github/workflows/deploy-prod.yml (Hedgeinform/zhenka),
# normalized to share the staging skeleton (per the ops design spec §2/§9:
# both variants share the workflow_dispatch backbone; prod is never auto —
# the operator catches it, gated by the `production` GH Environment's
# 1-reviewer approval, NOT by a push trigger).
#
# Render tokens:
#   <PROJECT>      project slug — build context dir + image name + service name
#   <GHCR_OWNER>   registry owner; derived at runtime from the repo owner
#                  (lowercased) into env.OWNER — never hardcoded here
#   <SERVER_DIR>   server project directory, e.g. /srv/<PROJECT>
#
# ci.yml is NOT emitted by ops — it is a bootstrap artifact this workflow only
# REUSES via `uses:`. Do not create ci.yml from this template.
#
# DELTA vs deploy-staging.yml (the ONLY differences):
#   environment: production   (enables the 1-reviewer approval gate)
#   image tag:   :main        (was :staging)
#   service:     <PROJECT>     on <PORT_PROD> (was <PROJECT>-staging / <PORT_STAGING>)
# Everything else is identical to deploy-staging.yml.

name: Deploy Production

on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/build-push-action@v5
        with:
          context: <PROJECT>
          push: true
          tags: ghcr.io/${{ env.OWNER }}/<PROJECT>:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd <SERVER_DIR>
            docker compose pull <PROJECT>
            docker compose up -d <PROJECT>
            sleep 5
            docker compose ps <PROJECT>
